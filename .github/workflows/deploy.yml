name: Deploy Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build MkDocs
        run: mkdocs build --site-dir docs/docs

      - name: Commit site
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/docs
          git commit -m "deploy: update docs" || exit 0
          git push