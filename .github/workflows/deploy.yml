name: Deploy Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Deploy
        run: mkdocs gh-deploy --force
